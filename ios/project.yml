name: Opus

options:
  bundleIdPrefix: com.opus
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "4"
    ENABLE_PREVIEWS: YES

configs:
  Debug: debug
  Release: release

targets:
  Opus:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: Opus
        excludes:
          - "**/*.md"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.opus.betaapp
        PRODUCT_NAME: Opus
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "4"
        INFOPLIST_FILE: Opus/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ENABLE_HARDENED_RUNTIME: YES
        DEVELOPMENT_TEAM: 8NL37K4349
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          VALIDATE_PRODUCT: YES

    info:
      path: Opus/Info.plist
      properties:
        UILaunchScreen: {}
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        CFBundleDisplayName: Opus
        CFBundleName: Opus
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        ITSAppUsesNonExemptEncryption: false
        NSPhotoLibraryUsageDescription: "Choose a profile photo"
